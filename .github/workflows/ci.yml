name: CI

# 触发时机：推到任意分支、PR 打开/更新、手动。
# CI 的职责：compile + unit tests + lint + release smoke。
# 不做：signed release（需要 keystore）、instrumented test（需要 emulator）。
# 这些放 Release hardening 阶段（见 HANDOFF P6.2 TODO）。

on:
  push:
    branches: ['**']
  pull_request:
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', 'gradle/libs.versions.toml') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Grant execute permission to gradlew
        run: chmod +x gradlew

      # settings.gradle.kts 配了阿里云 Maven 镜像加速国内开发，但阿里云 plugin-portal
      # 对 `com.google.devtools.ksp` 返回 404 — GitHub runner 上走官方源足够快。
      - name: Strip aliyun mirrors for CI
        run: sed -i '/maven\.aliyun\.com/d' settings.gradle.kts

      - name: Compile debug
        run: ./gradlew :app:compileDebugKotlin --stacktrace

      - name: Run unit tests
        run: ./gradlew :app:testDebugUnitTest --stacktrace

      - name: Upload test report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: app/build/reports/tests/testDebugUnitTest/
          retention-days: 7

  android-lint:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', 'gradle/libs.versions.toml') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Grant execute permission to gradlew
        run: chmod +x gradlew

      - name: Strip aliyun mirrors for CI
        run: sed -i '/maven\.aliyun\.com/d' settings.gradle.kts

      - name: Run Android Lint (debug)
        run: ./gradlew :app:lintDebug --stacktrace

      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-results-debug
          path: app/build/reports/lint-results-debug.html
          retention-days: 7

  android-release-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', 'gradle/libs.versions.toml') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Grant execute permission to gradlew
        run: chmod +x gradlew

      - name: Strip aliyun mirrors for CI
        run: sed -i '/maven\.aliyun\.com/d' settings.gradle.kts

      # 轻量 Kotlin 字节码兼容性检查：确认 release variant 的 Kotlin 编译器
      # 配置（target JVM、API level、opt-in 等）没坏。比 assembleRelease 快。
      - name: Compile release Kotlin (bytecode compat check)
        run: ./gradlew :app:compileReleaseKotlin --stacktrace

      # assembleRelease smoke：验证 R8/ProGuard 规则能跑通，不签名也 OK。
      # 产物（unsigned APK）不上传，只看 build 是否绿。
      - name: Assemble release (unsigned smoke)
        run: ./gradlew :app:assembleRelease --stacktrace

  # P8.2 Fix-W3 / Fix-WidgetBdd: 真在 emulator 跑 widget BDD instrumented test。
  # connectedDebugAndroidTest 跑 app/src/androidTest/ 下的 WidgetSmokeTest +
  # WidgetBddTest 共 9 条 executable BDD scenarios。
  # 仅在 master push 触发避免拖慢 PR feedback (emulator 12-18 分钟首次启动)。
  # Dep-1 #23 fix (#272): submit the resolved Gradle dependency graph to
  # GitHub's Dependabot vulnerability scanner. Master pushes only — feature
  # branches don't need fresh manifests on every commit. Lightweight (~30s).
  dependency-graph:
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Strip aliyun mirrors for CI
        run: sed -i '/maven\.aliyun\.com/d' settings.gradle.kts

      - name: Submit dependency graph
        uses: gradle/actions/dependency-submission@v4

  android-instrumented:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Strip aliyun mirrors for CI
        run: sed -i '/maven\.aliyun\.com/d' settings.gradle.kts

      - name: Enable KVM (required for hardware-accelerated emulator)
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Grant execute permission to gradlew
        run: chmod +x gradlew

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', 'gradle/libs.versions.toml') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Run instrumented BDD tests on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          target: default
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: true
          script: ./gradlew :app:connectedDebugAndroidTest --stacktrace

      - name: Upload instrumented test report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: instrumented-test-report
          path: app/build/reports/androidTests/
          retention-days: 7
