name: CI

# 触发时机：推到任意分支、PR 打开/更新、手动。
# CI 的全部职责：compile + unit tests。
# 不做：assembleRelease（需要 keystore）、instrumented test（需要 emulator）。
# 这些放 Release hardening 阶段（见 HANDOFF P6.2 TODO）。

on:
  push:
    branches: ['**']
  pull_request:
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', 'gradle/libs.versions.toml') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Grant execute permission to gradlew
        run: chmod +x gradlew

      # settings.gradle.kts 配了阿里云 Maven 镜像加速国内开发，但阿里云 plugin-portal
      # 对 `com.google.devtools.ksp` 返回 404 — GitHub runner 上走官方源足够快。
      - name: Strip aliyun mirrors for CI
        run: sed -i '/maven\.aliyun\.com/d' settings.gradle.kts

      - name: Compile debug
        run: ./gradlew :app:compileDebugKotlin --stacktrace

      - name: Run unit tests
        run: ./gradlew :app:testDebugUnitTest --stacktrace

      - name: Upload test report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: app/build/reports/tests/testDebugUnitTest/
          retention-days: 7
